    .info-bar { flex: 1; min-width: 180px; font-size: 0.78rem; color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .layout { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    aside { width: 300px; background: var(--sidebar); color: var(--sidebar-text); overflow-y: auto; flex-shrink: 0; transition: width 0.2s; }
    body.sidebar-hidden aside { width: 0; overflow: hidden; border: none; }
    .run-list { list-style: none; }
    .group-header {
      padding: 10px 12px 6px; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.04em; color: #94a3b8;
      background: #0f172a; position: sticky; top: 0; z-index: 1;
    }
    .run-item { padding: 9px 12px 9px 16px; border-bottom: 1px solid #334155; cursor: pointer; }
    .run-item:hover { background: #334155; }
    .run-item.active { background: var(--accent); }
    .run-item .name { font-weight: 600; font-size: 0.86rem; }
    .run-item .meta { font-size: 0.7rem; opacity: 0.85; margin-top: 2px; }

    main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: #fff; }
    .viewer-wrap { flex: 1; min-height: 0; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
    .summary { flex-shrink: 0; max-height: 38vh; background: #fff; border-top: 1px solid var(--border); padding: 8px 12px; font-size: 0.78rem; overflow: auto; transition: max-height 0.25s; }
    body.summary-hidden .summary { max-height: 0; padding: 0; border-top: none; overflow: hidden; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 5px 8px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { color: #64748b; font-weight: 600; position: sticky; top: 0; background: #fff; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.68rem; background: #fef3c7; color: #92400e; }
    .conditions-panel {
      flex-shrink: 0; max-height: 28vh; overflow-y: auto;
      background: #f8fafc; border-top: 1px solid var(--border);
      padding: 10px 14px; font-size: 0.8rem; color: #334155;

    let index = 0;
    let view = "density";
    const COMPARE_URL = "comparison.html";

    const elList = document.getElementById("run-list");
    const elSelect = document.getElementById("item-select");
    const elViewer = document.getElementById("viewer");
    const elInfo = document.getElementById("info-bar");
    const elSummary = document.getElementById("summary-body");
    const btnSidebar = document.getElementById("toggle-sidebar");
    const btnConditions = document.getElementById("toggle-conditions");
    const btnSummary = document.getElementById("toggle-summary");
    const navControls = document.getElementById("nav-controls");
    const elConditions = document.getElementById("conditions-body");

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderConditions(it) {
      if (!elConditions) return;
      if (!it || !it.conditions || view === "compare") {
        elConditions.innerHTML = '<p class="cond-summary">전체 비교 보기 — 항목을 선택하면 조건이 표시됩니다.</p>';
        return;
      }
      const c = it.conditions;
      let html = '<p class="cond-summary">' + escapeHtml(c.summary) + '</p>';
      (c.sections || []).forEach(sec => {
        html += '<div class="cond-section"><h4>' + escapeHtml(sec.title) + '</h4><ul>';
        (sec.lines || []).forEach(line => {
          html += '<li>' + escapeHtml(line) + '</li>';
        });
        html += '</ul></div>';
      });
      elConditions.innerHTML = html;
    }

    function pct(v) { return (parseFloat(v) * 100).toFixed(2) + "%"; }
    function probOf(probs, f) { return probs[f] ?? probs[String(f)] ?? 0; }

    function setPanel(btn, cls, hidden) {
      document.body.classList.toggle(cls, hidden);
      btn.classList.toggle("on", !hidden);
    }
    btnSidebar.addEventListener("click", () => setPanel(btnSidebar, "sidebar-hidden", !document.body.classList.contains("sidebar-hidden")));
    btnConditions.addEventListener("click", () => setPanel(btnConditions, "conditions-hidden", !document.body.classList.contains("conditions-hidden")));
    btnSummary.addEventListener("click", () => setPanel(btnSummary, "summary-hidden", !document.body.classList.contains("summary-hidden")));

    function buildUI() {
      elList.innerHTML = "";
      elSelect.innerHTML = "";
      elSummary.innerHTML = "";
      let flatIdx = 0;
      GROUPS.forEach(g => {
        const gh = document.createElement("li");
        gh.className = "group-header";
        gh.textContent = g.label + " (" + g.items.length + ")";
        elList.appendChild(gh);
        g.items.forEach(item => {
          const i = flatIdx;
          const li = document.createElement("li");
          li.className = "run-item" + (i === index ? " active" : "");
          li.dataset.flatIndex = String(i);
          const preview = item.kind === "preview" ? '<span class="tag-preview">설계</span>' : "";
          const cancelled = item.cancelled ? ' <span class="badge">중단</span>' : "";
          const meta = item.kind === "simulation"
            ? (item.run_id + "<br>눈 " + item.top_face + " " + (item.top_p*100).toFixed(1) + "%")
            : "밀도 미리보기";
          li.innerHTML = '<div class="name">' + item.label + preview + cancelled + '</div><div class="meta">' + meta + '</div>';
          li.addEventListener("click", () => { selectItem(i); setPanel(btnSidebar, "sidebar-hidden", true); });
          elList.appendChild(li);

          const opt = document.createElement("option");
          opt.value = i;
          opt.textContent = "[" + g.label.split(" — ")[0] + "] " + item.label;
          elSelect.appendChild(opt);

          if (item.kind === "simulation") {
            const probs = item.probabilities || {};
            const tr = document.createElement("tr");
            tr.style.cursor = "pointer";
            tr.addEventListener("click", () => selectItem(i));
            tr.innerHTML = '<td>' + g.label + '</td><td>' + item.run_id + '</td><td>' + item.rho_name + '</td><td>' + item.n_trials + '</td>'
              + '<td>' + item.top_face + ' (' + pct(item.top_p) + ')</td>'
              + [1,2,3,4,5,6].map(f => '<td>' + (probOf(probs,f) != null ? pct(probOf(probs,f)) : "—") + '</td>').join("");
            elSummary.appendChild(tr);
          }
          flatIdx++;
        });
      });
    }

    function currentUrl() {
      if (view === "compare") return COMPARE_URL;
      const it = ITEMS[index];
      if (view === "density") return it.density_url || "";
      return it.prob_url || "";
    }

    function updateView() {
      const isCompare = view === "compare";
      navControls.classList.toggle("hidden", isCompare);
      const it = ITEMS[index];
      elViewer.src = currentUrl();
      elSelect.value = index;
      document.querySelectorAll(".run-item").forEach(el => {
        el.classList.toggle("active", parseInt(el.dataset.flatIndex, 10) === index);
      });

      if (isCompare) {
        elInfo.textContent = "시뮬 " + 10 + "개 확률 비교";
        renderConditions(null);
        document.querySelectorAll(".view-tabs button").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.view === view);
          btn.disabled = btn.dataset.view === "compare" && 10 === 0;
        });
        return;
      }

      const kind = it.kind === "preview" ? "설계" : "시뮬";
      const nLabel = it.n_trials ? ("N=" + it.n_trials) : "";
      const top = it.top_face ? (" · 최다 눈 " + it.top_face) : "";
      elInfo.textContent = it.group_label + " · " + it.label + " · " + kind + " " + nLabel + top;
      renderConditions(it);

      document.querySelectorAll(".view-tabs button").forEach(btn => {
        const v = btn.dataset.view;
        btn.classList.toggle("active", v === view);
        if (v === "prob") btn.disabled = !it.prob_url;
        if (v === "density") btn.disabled = !it.density_url;
        if (v === "compare") btn.disabled = 10 === 0;
      });
    }

    function selectItem(i) {
      index = Math.max(0, Math.min(ITEMS.length - 1, i));
      if (view === "prob" && !ITEMS[index].prob_url) view = "density";
      updateView();
    }

    function step(delta) {
      if (view === "compare") return;
      let i = index + delta;
      while (i >= 0 && i < ITEMS.length) {
        const ok = view === "density" ? ITEMS[i].density_url : ITEMS[i].prob_url;
        if (ok) { selectItem(i); return; }
        i += delta;
      }
    }

    document.getElementById("btn-prev").addEventListener("click", () => step(-1));
    document.getElementById("btn-next").addEventListener("click", () => step(1));
    elSelect.addEventListener("change", e => selectItem(parseInt(e.target.value, 10)));
    document.querySelectorAll(".view-tabs button").forEach(btn => {
      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        view = btn.dataset.view;
        if (view === "prob" && !ITEMS[index].prob_url) {
          const j = ITEMS.findIndex(x => x.prob_url);
          if (j >= 0) index = j;
        }
        updateView();
      });
    });

    buildUI();
    updateView();
  </script>
</body>
</html>
