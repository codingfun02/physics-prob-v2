    if (_layoutDesktop.barTraces.length) {
      var sizes = _layoutDesktop.barTraces.map(function() { return null; });
      window.Plotly.restyle(plot, { "textfont.size": sizes }, _layoutDesktop.barTraces);
    }
    if (_CHART_KIND === "density" && _layoutDesktop.colorbarTrace != null) {
      var cb = { "colorbar.x": [_layoutDesktop.colorbarX] };
      if (_layoutDesktop.colorbarThickness != null) {
        cb["colorbar.thickness"] = [_layoutDesktop.colorbarThickness];
      }
      window.Plotly.restyle(plot, cb, [_layoutDesktop.colorbarTrace]);
    }
  }

  function _resizePlotly() {
    var plot = document.querySelector(".js-plotly-plot");
    if (!plot || !window.Plotly) return;
    _captureDesktop(plot);
    if (_isMobile()) {
      _applyMobile(plot);
    } else {
      _applyDesktop(plot);
    }
    window.Plotly.Plots.resize(plot);
  }

  window.__resizePlotlyChart = _resizePlotly;

  if (window.location.search.indexOf("mobile=1") >= 0) {
    document.documentElement.classList.add("mobile-embed");
  }

  var _initAttempts = 0;
  function _scheduleInit() {
    _initAttempts++;
    if (window.Plotly && document.querySelector(".js-plotly-plot")) {
      _resizePlotly();
      return;
    }
    if (_initAttempts < 50) setTimeout(_scheduleInit, 80);
  }

  _scheduleInit();
  window.addEventListener("load", function() { setTimeout(_scheduleInit, 0); });
  window.addEventListener("resize", _resizePlotly);
  window.addEventListener("orientationchange", function() { setTimeout(_resizePlotly, 300); });
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", _resizePlotly);
    window.visualViewport.addEventListener("scroll", _resizePlotly);
  }
</script>
